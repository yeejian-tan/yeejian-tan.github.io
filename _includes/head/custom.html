{% include base_path %}

<!-- start custom head snippets -->

<!-- Favicons — minimal modern set. The SVG is resolution-independent, so the
     browser scales one file to any size/DPI (no per-size PNG downloads). PNG
     and .ico are fallbacks for browsers without SVG-favicon support; the
     browser reads `sizes`/`type` and fetches only the one it needs. -->
<link rel="icon" href="{{ base_path }}/images/favicon.svg" type="image/svg+xml">
<link rel="icon" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32" type="image/png">
<link rel="icon" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192" type="image/png">
<link rel="apple-touch-icon" href="{{ base_path }}/images/apple-touch-icon-180x180.png">
<link rel="icon" href="{{ base_path }}/images/favicon.ico" sizes="any">
<link rel="manifest" href="{{ base_path }}/images/manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.min.css"/>

<!-- Heavy, page-specific libraries (MathJax/Plotly/Mermaid) are loaded deferred
     and opt-in from _includes/footer/custom.html, not here, to keep the <head>
     free of render-blocking and unused third-party scripts. -->

<!-- end custom head snippets -->
